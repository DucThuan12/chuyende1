{% extends "base.html" %}
{% block body %}
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="sidebar-top">
            <a class="brand-link" href="{{ url_for('home') }}">
            <div class="brand-badge small">FitMotion</div></a>
            <p class="sidebar-sub">Quản trị hệ thống</p>
        </div>

        <nav class="sidebar-menu">
            <a class="menu-item" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
            <a class="menu-item active" href="{{ url_for('admin_exercises') }}">Quản lý bài tập</a>
        </nav>
    </aside>

    <section class="admin-content">
        <header class="admin-topbar">
            <div>
                <p class="panel-tag">Thêm bài tập</p>
                <h1>Tạo bài tập mới</h1>
            </div>

            <div class="user-menu glass-chip">
                <span>{{ user.name }}</span>
                <a href="{{ url_for('logout') }}">Đăng xuất</a>
            </div>
        </header>

        <section class="panel">
            <form method="POST" enctype="multipart/form-data" class="admin-form">
                <div class="form-grid two-col">
                    <div>
                        <label>Tên bài tập</label>
                        <input type="text" name="name" required>
                    </div>
                    <div>
                        <label>Slug</label>
                        <input type="text" name="slug" placeholder="bo-trong-se-tu-tao">
                    </div>
                    <div>
                        <label>Nhóm cơ</label>
                        <input type="text" name="muscle_group">
                    </div>
                    <div>
                        <label>Độ khó</label>
                        <input type="text" name="difficulty" value="Cơ bản">
                    </div>
                    <div>
                        <label>Tuổi tối thiểu</label>
                        <input type="number" name="age_min" value="15">
                    </div>
                    <div>
                        <label>Tuổi tối đa</label>
                        <input type="number" name="age_max" value="100">
                    </div>
                    <div>
                        <label>Calo / rep</label>
                        <input type="number" step="0.01" name="calories" value="0.10">
                    </div>
                    <div>
                        <label>Chế độ tay</label>
                        <select name="side_mode">
                            <option value="none">Không chia bên</option>
                            <option value="left">Tay trái</option>
                            <option value="right">Tay phải</option>
                        </select>
                    </div>

                    <div class="full-col">
                        <label>Mô tả</label>
                        <textarea name="description"></textarea>
                    </div>
                    <div class="full-col">
                        <label>Hướng dẫn động tác</label>
                        <textarea name="guide_text"></textarea>
                    </div>
                    <div class="full-col">
                        <label>Phù hợp với</label>
                        <textarea name="suitable_for"></textarea>
                    </div>
                    <div class="full-col">
                        <label>Cần thận trọng với</label>
                        <textarea name="caution_for"></textarea>
                    </div>
                    <div>
                        <label>Ảnh xem trước</label>
                        <input type="file" name="preview_image" accept="image/*">
                    </div>
                    <div>
                        <label>File FBX</label>
                        <input type="file" name="fbx_file" accept=".fbx">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Lưu bài tập</button>
            </form>
        </section>
    </section>
</div>
{% endblock %}
